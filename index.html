<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<title>Tra cứu bảo hành</title>

<style>

body{
font-family:Arial;
background:#f4f6f8;
padding:40px;
}

.container{
max-width:1100px;
margin:auto;
}

h1{
text-align:center;
margin-bottom:30px;
}

.searchBox{
display:flex;
gap:10px;
margin-bottom:30px;
}

input{
flex:1;
padding:12px;
border:1px solid #ccc;
border-radius:6px;
font-size:16px;
}

button{
padding:12px 20px;
border:none;
background:#2c7be5;
color:white;
border-radius:6px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#1a5ec8;
}

table{
margin-top:20px;
width:100%;
border-collapse:collapse;
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

th{
background:#2c7be5;
color:white;
padding:12px;
}

td{
padding:10px;
border-bottom:1px solid #eee;
text-align:center;
}

.status-ok{
color:green;
font-weight:bold;
}

.status-expired{
color:red;
font-weight:bold;
}

.addBox{
margin-top:40px;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.formRow{
display:flex;
gap:10px;
margin-bottom:10px;
}

.formRow input{
flex:1;
}

.saveBtn{
background:#28a745;
width:100%;
}

</style>

</head>

<body>

<div class="container">

<h1>Tra cứu bảo hành</h1>

<div class="searchBox">

<input id="searchInput" placeholder="Nhập SĐT / tên / mã đơn">

<button onclick="search()">Tìm</button>

</div>

<table>

<thead>

<tr>
<th>Tên</th>
<th>SĐT</th>
<th>Mã đơn</th>
<th>Sản phẩm</th>
<th>Ngày mua</th>
<th>Bảo hành đến</th>
<th>Trạng thái</th>
</tr>

</thead>

<tbody id="tableBody">

<tr>
<td colspan="7">Nhập thông tin để tra cứu bảo hành</td>
</tr>

</tbody>

</table>


<div class="addBox">

<h2>Nhập dữ liệu bảo hành</h2>

<div class="formRow">
<input id="name" placeholder="Tên khách">
<input id="phone" placeholder="SĐT">
</div>

<div class="formRow">
<input id="order" placeholder="Mã đơn">
<input id="product" placeholder="Sản phẩm">
</div>

<div class="formRow">
<input id="buy" type="date">
</div>

<button class="saveBtn" onclick="saveData()">Lưu dữ liệu</button>

</div>

</div>

<script>

let data=[]

document.getElementById("searchInput").addEventListener("keypress",function(e){
if(e.key==="Enter"){
search()
}
})

fetch("https://opensheet.elk.sh/1mNui44f4fTX2raO5OlsbDVo9lrDnsYADMpwhq8YSmZY/Sheet1")
.then(res=>res.json())
.then(res=>{
data=res
})

function add24Months(date){

let d=new Date(date)
d.setMonth(d.getMonth()+24)

return d

}

function formatDate(date){

return date.toLocaleDateString("vi-VN")

}

function getStatus(warrantyDate){

let today=new Date()

if(today<=warrantyDate){
return '<span class="status-ok">CÒN BẢO HÀNH</span>'
}else{
return '<span class="status-expired">HẾT BẢO HÀNH</span>'
}

}

function render(list){

let html=""

list.forEach(i=>{

let buyDate=new Date(i.buy)
let warrantyDate=add24Months(buyDate)

html+=`

<tr>

<td>${i.name || ""}</td>
<td>${i.phone || ""}</td>
<td>${i.order || ""}</td>
<td>${i.product || ""}</td>
<td>${formatDate(buyDate)}</td>
<td>${formatDate(warrantyDate)}</td>
<td>${getStatus(warrantyDate)}</td>

</tr>

`

})

if(list.length===0){
html=`<tr><td colspan="7">Không tìm thấy dữ liệu</td></tr>`
}

document.getElementById("tableBody").innerHTML=html

}

function search(){

let keyword=document.getElementById("searchInput").value.trim().toLowerCase()

if(!keyword){

document.getElementById("tableBody").innerHTML=
`<tr><td colspan="7">Vui lòng nhập thông tin cần tìm</td></tr>`

return

}

let result=data.filter(i=>{

let name=(i.name || "").toLowerCase()
let phone=(i.phone || "")
let order=(i.order || "").toLowerCase()

return name.includes(keyword) || phone.includes(keyword) || order.includes(keyword)

})

render(result)

}

function saveData(){

let dataSend={

name:document.getElementById("name").value,
phone:document.getElementById("phone").value,
order:document.getElementById("order").value,
product:document.getElementById("product").value,
buy:document.getElementById("buy").value

}

fetch("https://script.google.com/macros/s/AKfycbzTaFrikrAr2J6f1rvJPmB9IDIZhRHnwdwJpaki9YD3hCFENnW1rsXicZPCA1-_3xe9JA/exec",{

method:"POST",
body:JSON.stringify(dataSend)

})
.then(res=>res.text())
.then(res=>{

alert("Đã lưu dữ liệu")

location.reload()

})

}

</script>

</body>
</html>
